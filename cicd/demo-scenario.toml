# Demo scenario for gen-demo-gif.py. Each [[step]] types its show= line into the
# fake terminal, runs run= (default: show) for real, and shows the output. {prog}
# renders as the program name; {bin} runs as the tested binary path. pause= is the
# read time in seconds. Paths in run= are relative to the repo root (where cicd runs).

title = "shcl"
prog  = "shcl"
seed  = 7
font  = ["Monaspace Argon SemiBold"]

[[step]]
note  = "A messy config: repeated fields, a typo, embedded raw text"
show  = "cat app.shcl"
run   = "cat cicd/demo/app.shcl"
pause = 5.0
scrollrate = 70
linems = 200

[[step]]
note  = "Read one value, typed - one obvious call"
show  = "{prog} get --int app.shcl 'servers[web1].port'"
run   = "{bin} get --int cicd/demo/app.shcl 'servers[web1].port'"
pause = 2.6

[[step]]
show  = "{prog} get --string --array app.shcl 'servers[web1].tags'"
run   = "{bin} get --string --array cicd/demo/app.shcl 'servers[web1].tags'"
pause = 2.6

[[step]]
note  = "Repeated fields are instances - enumerate them"
show  = "{prog} instances app.shcl servers"
run   = "{bin} instances cicd/demo/app.shcl servers"
pause = 2.6

[[step]]
note  = "Loose mode forgives currency and thousands separators"
show  = "{prog} get --int --strictness=loose app.shcl budget"
run   = "{bin} get --int --strictness=loose cicd/demo/app.shcl budget"
pause = 2.8

[[step]]
show  = "{prog} get --datetime app.shcl window"
run   = "{bin} get --datetime cicd/demo/app.shcl window"
pause = 2.4

[[step]]
note  = "Raw blocks come back verbatim"
show  = "{prog} get --raw app.shcl motd"
run   = "{bin} get --raw cicd/demo/app.shcl motd"
pause = 2.8

[[step]]
note  = "One bad line never kills the file - it is diagnosed and skipped"
show  = "{prog} check app.shcl"
run   = "{bin} check cicd/demo/app.shcl"
pause = 3.2

[[step]]
note  = "Canonical formatting: merged, aligned, minimally quoted"
show  = "{prog} fmt app.shcl"
run   = "{bin} fmt cicd/demo/app.shcl"
pause = 5.0
scrollrate = 70
linems = 200
