## Correctness gate only. Everything else (cross-compile, publish, artifacts)
## stays in the local pipeline: cicd/cicd.bash. One definition of "passing" -
## this just runs the engine's --ci mode.
name: ci

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      ## rustup on the runner reads rust-toolchain.toml and fetches the pinned
      ## toolchain on first cargo call; keep "what passing means" in the engine.
      ## Go version comes from go.mod (no go.sum - the binding is zero-dep, so
      ## the module cache is off).
      - uses: actions/setup-go@v5
        with:
          go-version-file: source/go/go.mod
          cache: false
      ## Python binding is a zero-dep single file; pin the interpreter so a runner
      ## image bump can't silently shift float/coercion formatting under it.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      ## Lint-stage tools beyond the toolchains. ruff/mypy/cppcheck ride the
      ## setup-python interpreter; markdownlint via npm; PSScriptAnalyzer into
      ## the runner's preinstalled pwsh. shellcheck is already on the image.
      - run: |
          pip install ruff mypy cppcheck
          npm install -g markdownlint-cli2
          pwsh -NoProfile -Command 'Install-Module PSScriptAnalyzer -Force -Scope CurrentUser'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            source/rust/target
          key: ci-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'source/rust/Cargo.lock') }}
      - run: cicd/cicd.bash --ci
